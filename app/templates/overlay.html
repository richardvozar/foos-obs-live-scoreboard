<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OBS Overlay</title>
  <link rel="stylesheet" href="/static/css/overlay.css" />
</head>
<body>
  <div class="wrap">
    <div class="team">
      <div class="name" id="ln">Bal</div>
      <div class="meta" id="lt">Időkérés: 2</div>
    </div>

    <div class="mid">
      <div class="sets" id="sets">0 - 0</div>
      <div class="goals" id="goals">0 - 0</div>
      <div class="pillrow">
        <div class="pill" id="bo">BO3</div>
        <div class="pill" id="req">Nyerni: 2 / 2</div>
      </div>
      <div class="toast" id="msg"></div>
    </div>

    <div class="team right">
      <div class="name" id="rn">Jobb</div>
      <div class="meta" id="rt">Időkérés: 2</div>
    </div>
  </div>

  <div>
    <a href="/">Vissza</a>
  </div>

  <script src="/static/js/overlay.js"></script>
</body>
</html>
